name: lovia
description: "Lovia — an AI-companion chat app. Portfolio-grade Flutter reference: feature-first Clean Architecture + GetX."
publish_to: 'none'
version: 1.0.0+1

environment:
  sdk: ^3.11.5

dependencies:
  # Remote image loading with caching.
  cached_network_image: ^3.4.1
  cupertino_icons: ^1.0.8
  # HTTP client (auth only) + interceptors.
  dio: ^5.7.0
  flutter:
    sdk: flutter
  # Facebook social sign-in.
  flutter_facebook_auth: ^7.1.1
  flutter_localizations:
    sdk: flutter
  # Secure token storage.
  flutter_secure_storage: ^9.2.4
  # Immutable entities & sealed unions annotations.
  freezed_annotation: ^2.4.4
  # State, DI (Bindings), routing, middleware.
  get: ^4.7.2
  # Prefs + mock persistence.
  get_storage: ^2.1.1
  # Google social sign-in.
  google_sign_in: ^6.2.2
  # i18n / formatting.
  intl: any
  # DTO (de)serialization annotations.
  json_annotation: ^4.9.0
  # Structured logging.
  logger: ^2.5.0
  # Apple social sign-in.
  sign_in_with_apple: ^6.1.3

dev_dependencies:
  # Codegen.
  build_runner: ^2.4.13
  flutter_test:
    sdk: flutter
  freezed: ^2.5.7
  json_serializable: ^6.8.0
  # Mocking for unit/widget tests.
  mocktail: ^1.0.4
  # Strict lints — hiring-grade signal.
  very_good_analysis: ^7.0.0

flutter:
  uses-material-design: true
  fonts:
    # Bundled so text never depends on a runtime network fetch (Nunito is a
    # variable font; fontWeight maps to its wght axis).
    - family: Nunito
      fonts:
        - asset: assets/fonts/Nunito.ttf
